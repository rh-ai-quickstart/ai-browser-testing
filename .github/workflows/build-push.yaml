name: Build and Push Container Image

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'Containerfile'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            quay.io/rh_ee_addrew/ai-browser-testing:latest
            quay.io/rh_ee_addrew/ai-browser-testing:${{ github.sha }}
